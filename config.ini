[global]
# Logging level (valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_level = INFO
# Test mode - when true, prefixes 'meshcore/test/' to all published topics (valid values: true, false)
test = false

[remote1]
# Enable or disable this remote broker connection (valid values: true, false)
enable=true
###############
# N.B. letsmesh broker is extremely picky. don't change any of the settings
# below. If it doesn't like them, it sometimes doesn't disconnect, but just
# stops sending data after a while
# some notes: doesn't do v5, so also doesn't do session expiry, doesn't like qos=1, doesn't like keepalive=60
###############
# Remote MQTT broker hostname or IP address
host = mqtt.lincomatic.com
# Remote MQTT broker port (443 for websockets, 8883/1883 for TCP)
port = 8883
# MQTT protocol version (valid values: v5, v311, v31, 5, 3.1.1, 3.1; default: v5)
protocol = v311
# Use WebSocket transport instead of TCP (valid values: true, false)
use_websockets = false
# Enable TLS/SSL encryption for this connection (valid values: true, false)
use_tls=true
# Skip certificate verification - insecure (valid values: true, false)
tls_insecure=true
# Default Quality of Service level for subscriptions (valid values: 0, 1, 2)
qos = 0
# MQTT v5 session expiry interval - only used for protocol v5 (unit: seconds; 0 = clean session)
session_expiry = 0
# Wait time before retrying failed connections (unit: seconds)
retry_interval = 15
# MQTT keepalive timeout (unit: seconds)
keepalive = 60
# Username for remote broker authentication
user = wcmesh
# Password for remote broker authentication
pass = meshcoast
# Comma-separated list of topics to subscribe to on this remote broker
topics = meshcore/LAX/#,meshcore/SAN/#,meshcore/OXR/#,meshcore/PSP/#,meshcore/SNA/#,meshcore/ONT/#,meshcore/SBA/#,meshcore/BFL/#,meshcore/CMA/#

[local]
# Local MQTT broker hostname or IP address to publish messages to
host = mqtt.lincomatic.com
# Local MQTT broker port
port = 8883
# Use WebSocket transport instead of TCP (valid values: true, false)
use_websockets = false
# Enable TLS/SSL encryption for local broker connection (valid values: true, false)
use_tls=true
# Skip certificate verification - insecure (valid values: true, false)
tls_insecure=true
# MQTT protocol version (valid values: v5, v311, v31, 5, 3.1.1, 3.1; default: v5)
protocol = v311
# MQTT keepalive timeout for local connection (unit: seconds)
keepalive = 60
# Wait time before retrying failed local broker connections (unit: seconds)
retry_interval = 15
# Username for local broker authentication
# wcadm can read/write only to meshcore/#
user = wcmadm
# Password for local broker authentication
pass = blahblah123
